<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="{{ site.description }}">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Zeko Ethereum L2 home">
        <span class="brand-mark" aria-hidden="true">Z</span>
        <span>Zeko <strong>Ethereum L2</strong></span>
      </a>
      <nav class="topnav" aria-label="Main navigation">
        <a class="active" href="{{ '/' | relative_url }}">Docs</a>
        <a href="https://zeko.io/">Zeko</a>
        <a href="https://github.com/zeko-labs/sp1-verifier">GitHub</a>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode">◐</button>
      </nav>
    </header>

    <button class="mobile-menu" type="button" aria-label="Open navigation">Menu</button>

    <div class="docs-shell">
      <aside class="sidebar">
        <nav aria-label="Documentation navigation">
          <p class="sidebar-label">Overview</p>
          <a href="#architecture">Architecture</a>
          <p class="sidebar-label">Core Protocol</p>
          <a href="#settlement-flow">Settlement</a>
          <a href="#deposit-bridge-flow">Deposit Bridge</a>
          <a href="#withdrawal-flow">Withdrawals</a>
          <p class="sidebar-label">Reference</p>
          <a href="#trust-boundaries">Trust Boundaries</a>
          <a href="#commands">Commands</a>
          <a href="#fixture-checkpoint">Fixture Checkpoint</a>
        </nav>
        <div class="sidebar-footer"><span class="status-dot"></span>SP1-powered verification</div>
      </aside>

      <main class="content">
        <div class="eyebrow">Zeko × Ethereum</div>
        <div class="article">{{ content }}</div>
        <footer class="footer">
          <span>Built for the Zeko ecosystem</span>
          <a href="https://github.com/zeko-labs/sp1-verifier">View source on GitHub</a>
        </footer>
      </main>

      <aside class="toc">
        <p>On this page</p>
        <nav id="toc-nav" aria-label="Table of contents"></nav>
      </aside>
    </div>
    <script src="{{ '/assets/js/docs.js' | relative_url }}"></script>
  </body>
</html>
